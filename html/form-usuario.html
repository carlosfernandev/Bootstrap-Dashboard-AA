<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo usuario</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar bg-body-secondary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"
          ><strong>Panel Administrador</strong></a
        >
        <a class="navbar-brand"><strong>Usuario: Admin</strong></a>
      </div>
    </nav>
    <main class="container py-3">
      <div class="bg-body rounded p-3">
        <!-- nombre -->
        <div class="mb-3">
          <label for="formControlLblNombre" class="form-label">Nombre</label>
          <input
            type="text"
            class="form-control"
            id="formControlNombre"
            placeholder="Juan Andrés Patiño"
          />
        </div>

        <!-- correo -->
        <div class="mb-3">
          <label for="formControlLblCorreo" class="form-label">Correo</label>
          <input
            type="email"
            class="form-control"
            id="formControlCorreo"
            placeholder="juan@gmail.com"
          />
        </div>

        <!-- rol -->
        <div class="mb-3">
          <label for="formControlSelectRol" class="form-label">Rol</label>
          <select
            class="form-select"
            id="formControlRoles"
            aria-label="Select para rol: usuario o administrador"
          >
            <option selected disabled>Escoja una opción</option>
            <option value="1">Administrador</option>
            <option value="2">Usuario</option>
          </select>
        </div>

        <!-- boton enviar -->
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      const tooltipTriggerList = document.querySelectorAll(
        '[data-bs-toggle="tooltip"]',
      );
      const tooltipList = [...tooltipTriggerList].map(
        (tooltipTriggerEl) => new bootstrap.Tooltip(tooltipTriggerEl),
      );
    </script>
  </body>
</html>
