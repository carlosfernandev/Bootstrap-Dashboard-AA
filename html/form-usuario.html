<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo Usuario</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-body-tertiary">
    <!-- Navbar Superior -->
    <nav class="navbar navbar-expand-lg bg-body-secondary sticky-top shadow-sm">
      <div class="container-fluid px-3">
        <a href="/dashboard.html" class="navbar-brand fw-bold">Panel Administrador</a>
        <span class="ms-auto navbar-text fw-semibold">Usuario: Admin</span>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid py-3 py-md-4 px-2 px-md-4">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-11 col-md-8 col-lg-6">
          <div class="bg-body rounded-3 p-3 p-sm-4 shadow-sm">
            <h2 class="mb-4 fw-bold">Nuevo Usuario</h2>
            
            <form id="formNewUser" novalidate>
              <!-- Campo Nombre -->
              <div class="mb-4">
                <label for="inputName" class="form-label fw-semibold">Nombre</label>
                <input
                  type="text"
                  class="form-control"
                  id="inputName"
                  placeholder="Ej: Juan Andrés Patiño"
                  required
                />
                <small class="text-muted d-block mt-1">Ingrese el nombre completo del usuario</small>
              </div>

              <!-- Campo Correo -->
              <div class="mb-4">
                <label for="inputEmail" class="form-label fw-semibold">Correo Electrónico</label>
                <input
                  type="email"
                  class="form-control"
                  id="inputEmail"
                  placeholder="Ej: juan@gmail.com"
                  required
                />
                <small class="text-muted d-block mt-1">Ingrese un correo válido</small>
              </div>

              <!-- Campo Rol con espacio extra para dropdown -->
              <div class="mb-5 pb-3">
                <label for="selectRole" class="form-label fw-semibold">Rol</label>
                <select
                  class="form-select"
                  id="selectRole"
                  required
                >
                  <option value="" disabled selected>Escoja una opción</option>
                  <option value="admin">👨‍💼 Administrador</option>
                  <option value="user">👤 Usuario</option>
                </select>
                <small class="text-muted d-block mt-1">Seleccione el rol del nuevo usuario</small>
              </div>

              <!-- Botones de Acción -->
              <div class="d-flex flex-column gap-2 flex-sm-row justify-content-end gap-sm-2 mt-4">
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  data-bs-toggle="modal"
                  data-bs-target="#confirmCancelModal"
                >
                  ← Volver
                </button>
                <button
                  type="submit"
                  class="btn btn-primary"
                >
                  ✓ Enviar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Modal de Cancelación -->
      <div
        class="modal fade"
        id="confirmCancelModal"
        data-bs-backdrop="static"
        data-bs-keyboard="false"
        tabindex="-1"
        aria-labelledby="confirmCancelLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-light">
              <h1 class="modal-title fs-5 fw-bold" id="confirmCancelLabel">
                ¿Volver a Usuarios?
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              ¿Desea salir sin guardar los cambios?
            </div>
            <div class="modal-footer gap-2">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <a href="/html/vista-usuarios.html" class="btn btn-primary">
                Confirmar
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal de Éxito -->
      <div
        class="modal fade"
        id="successModal"
        data-bs-backdrop="static"
        data-bs-keyboard="false"
        tabindex="-1"
        aria-labelledby="successModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content border-success">
            <div class="modal-header bg-light border-success">
              <h1 class="modal-title fs-5 fw-bold text-success" id="successModalLabel">
                <i class="bi bi-check-circle"></i> Éxito
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              Usuario creado exitosamente
            </div>
            <div class="modal-footer">
              <a href="/html/vista-usuarios.html" class="btn btn-success">
                Ir a la lista de usuarios
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    
    <!-- Script para manejar el formulario -->
    <script>
      document.getElementById('formNewUser').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Validar el formulario
        if (!this.checkValidity() === false) {
          e.stopPropagation();
        }
        
        this.classList.add('was-validated');
        
        // Mostrar modal de éxito después de 500ms
        if (this.checkValidity()) {
          setTimeout(() => {
            const successModal = new bootstrap.Modal(document.getElementById('successModal'));
            successModal.show();
          }, 500);
        }
      });
    </script>
  </body>
</html>
