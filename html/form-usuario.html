<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo usuario</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar bg-body-secondary">
      <div class="container-fluid">
        <strong>Panel Administrador</strong></a
        >
        <a class="navbar-brand"><strong>Usuario: Admin</strong></a>
      </div>
    </nav>
    <main class="container py-3">
      <div class="bg-body rounded p-3">
        <!-- nombre -->
        <div class="mb-3">
          <label for="formControlLblNombre" class="form-label">Nombre</label>
          <input
            type="text"
            class="form-control"
            id="formControlNombre"
            placeholder="Juan Andrés Patiño"
          />
        </div>

        <!-- correo -->
        <div class="mb-3">
          <label for="formControlLblCorreo" class="form-label">Correo</label>
          <input
            type="email"
            class="form-control"
            id="formControlCorreo"
            placeholder="juan@gmail.com"
          />
        </div>

        <!-- rol -->
        <div class="mb-3">
          <label for="formControlSelectRol" class="form-label">Rol</label>
          <select
            class="form-select"
            id="formControlRoles"
            aria-label="Select para rol: usuario o administrador"
          >
            <option selected disabled>Escoja una opción</option>
            <option value="1">Administrador</option>
            <option value="2">Usuario</option>
          </select>
        </div>
        <div class="d-flex flex-column-reverse flex-sm-row justify-content-center mt-4 gap-3">
          <!-- Button trigger modal -->
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-toggle="modal"
            data-bs-target="#staticBackdrop"
          >
            Volver al inicio
          </button>
          <button
            type="button"
            class="btn btn-primary"
            onclick="window.location.href='/html/vista-usuarios.html'">
            Guardar
          </button>
        </div>

        <!-- boton enviar -->
      </div>
        <div
        class="modal fade"
        id="staticBackdrop"
        data-bs-backdrop="static"
        data-bs-keyboard="false"
        tabindex="-1"
        aria-labelledby="staticBackdropLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="staticBackdropLabel">
                ¿Volver a Usuarios?
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">¿Desea salir sin guardar?</div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <a href="/html/vista-usuarios.html" class="btn btn-primary">Confirmar</a>
            </div>
          </div>
        </div>
      </div> 
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      const tooltipTriggerList = document.querySelectorAll(
        '[data-bs-toggle="tooltip"]',
      );
      const tooltipList = [...tooltipTriggerList].map(
        (tooltipTriggerEl) => new bootstrap.Tooltip(tooltipTriggerEl),
      );
    </script>
  </body>
</html>
